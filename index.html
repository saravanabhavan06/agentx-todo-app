<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentX Todo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>AgentX Todo</h1>
    <div class="input-row">
      <input id="task-input" type="text" placeholder="Add a new task..." />
      <button id="add-btn">Add</button>
    </div>
    <ul id="task-list"></ul>
    <div class="footer">
      <span id="count">0 tasks remaining</span>
      <button id="clear-btn">Clear completed</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
